  <style>
    /* Simple lightbox */
    .lightbox-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      display: none; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .lightbox-overlay.open { display: flex; }
    .lightbox-overlay img {
      max-width: 92vw; max-height: 92vh;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
      user-select: none;
    }
    .lightbox-overlay .lb-btn {
      position: absolute; background: none; border: none; color: #fff;
      font-size: 2rem; cursor: pointer; padding: 1rem;
      transition: transform 0.15s ease;
    }
    .lightbox-overlay .lb-btn:hover { transform: scale(1.15); }
    .lightbox-overlay .lb-close { top: 1rem; right: 1rem; }
    .lightbox-overlay .lb-prev { left: 1rem; top: 50%; transform: translateY(-50%); }
    .lightbox-overlay .lb-next { right: 1rem; top: 50%; transform: translateY(-50%); }
    .lightbox-overlay .lb-prev:hover { transform: translateY(-50%) scale(1.15); }
    .lightbox-overlay .lb-next:hover { transform: translateY(-50%) scale(1.15); }
    .lightbox-overlay .lb-counter {
      position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 0.9rem; opacity: 0.7;
    }
  </style>
</head>
